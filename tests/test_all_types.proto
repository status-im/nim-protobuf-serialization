syntax = "proto3";

message StringObj {
  string x = 1;
}

message BytesObj {
  bytes x = 1;
}

message PInt32Obj {
  int32 x = 1;
}

message PUInt32Obj {
  uint32 x = 1;
}

message PInt64Obj {
  int64 x = 1;
}

message PUInt64Obj {
  uint64 x = 1;
}

message SInt32Obj {
  sint32 x = 1;
}

message SInt64Obj {
  sint64 x = 1;
}

message FixedInt32Obj {
  sfixed32 x = 1;
}

message FixedInt64Obj {
  sfixed64 x = 1;
}

message FixedUInt32Obj {
  fixed32 x = 1;
}

message FixedUInt64Obj {
  fixed64 x = 1;
}

message Float32Obj {
  float x = 1;
}

message Float64Obj {
  double x = 1;
}
